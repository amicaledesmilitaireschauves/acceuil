<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC | Connexion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1 class="logo-title">AMC</h1>
                <p class="logo-subtitle">Amicale des Militaires Chauves</p>
            </div>

            <div id="login-form">
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Mot de passe" required>
                </div>
                <button onclick="checkPassword()" class="login-btn">
                    <span>ACCÉDER AU SITE</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <p id="error-msg" class="error-msg">Mot de passe incorrect</p>
            </div>

            <div class="login-footer">
                <p><i class="fas fa-shield-halved"></i> Accès reservé aux membres</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
